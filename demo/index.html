<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pendu — Gallery Layout Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      min-height: 100vh;
    }
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #111;
      border-bottom: 1px solid #333;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }
    .toolbar h1 {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
    }
    .toolbar label {
      font-size: 13px;
      color: #aaa;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toolbar input[type="range"] {
      width: 120px;
    }
    .toolbar button {
      padding: 6px 16px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #222;
      color: #e0e0e0;
      cursor: pointer;
      font-size: 13px;
    }
    .toolbar button:hover { background: #333; }
    .toolbar .count { font-variant-numeric: tabular-nums; min-width: 24px; }
    .stats {
      padding: 12px 24px;
      font-size: 12px;
      color: #666;
      font-family: monospace;
    }
    .gallery-container {
      max-width: 900px;
      margin: 24px auto;
      padding: 0 24px;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./main.tsx"></script>
</body>
</html>
